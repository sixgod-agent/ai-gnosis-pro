name: Daily Fetch Lottery History

on:
  schedule:
    # 每天北京时间 21:40 执行（UTC 13:40），开奖时间为 21:32
    - cron: '40 13 * * *'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch lottery history
        run: python3 scripts/fetch-history.py

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet public/history.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No new data, skipping deploy."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "New data detected, will commit and deploy."
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/history.json
          git commit -m "chore: auto-update lottery history $(date -u +%Y-%m-%d)"
          git push

      # 数据更新后触发部署
      # push to main 会自动触发 deploy.yml
